---
name: Limitador

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["*"]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:
  schedule:
    - cron: "5 4 * * *"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Mock e2e tests
        run: |
          echo "Mocking e2e tests"

      - name: Sleep for x seconds
        run: sleep 10
